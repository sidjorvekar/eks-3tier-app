<!DOCTYPE html>
<html>
<body>
    <h1>3-Tier App Status</h1>
    <div id="status">Loading...</div>
    <script>
        fetch('http://localhost:5000/api/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('status').innerText = 
                    data.status + " | DB Time: " + data.dbTime;
            })
            .catch(err => document.getElementById('status').innerText = "Backend Unreachable");
    </script>
</body>
</html>
